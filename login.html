<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Sign In</title>
   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
       :root {
    --primary: #3498db;
    --secondary: #2980b9;
    --dark: #2c3e50;
    --light: #ecf0f1;
    --accent: #1abc9c;
    --highlight: #9b59b6;
}
.dd{
    display: none;
    color:white;
    font-size: 0.8rem;
    margin-top: 5px;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
}

.bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    filter: blur(20px);
    animation: float 15s infinite linear;
}

.bubble:nth-child(1) {
    width: 300px;
    height: 300px;
    top: -50px;
    left: -50px;
    animation-delay: 0s;
}

.bubble:nth-child(2) {
    width: 400px;
    height: 400px;
    bottom: -80px;
    right: -80px;
    animation: float 18s infinite linear reverse;
    animation-delay: 2s;
}

.bubble:nth-child(3) {
    width: 200px;
    height: 200px;
    top: 40%;
    right: 20%;
    animation: float 12s infinite linear;
    animation-delay: 4s;
}

.signin-container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    padding: 40px;
    width: 100%;
    max-width: 450px;
    z-index: 10;
    border: 1px solid rgba(255, 255, 255, 0.3);
    transform-style: preserve-3d;
    perspective: 1000px;
    transition: transform 0.5s ease, box-shadow 0.5s ease;
}

.signin-container:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

.signin-header {
    text-align: center;
    margin-bottom: 40px;
    transform: translateZ(30px);
    animation: fadeIn 0.8s ease-out;
}

.signin-header h1 {
    color: white;
    font-size: 2.5rem;
    margin-bottom: 10px;
    text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}

.signin-header p {
    color: rgba(255, 255, 255, 0.8);
    font-size: 0.9rem;
}

.form-group {
    margin-bottom: 25px;
    position: relative;
    transform: translateZ(20px);
    animation: slideUp 0.6s ease-out;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: white;
    font-size: 0.9rem;
    font-weight: 500;
}

.form-group input {
    width: 100%;
    padding: 15px 20px 15px 45px;
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 50px;
    font-size: 1rem;
    color: white;
    transition: all 0.3s ease;
}

.form-group input::placeholder {
    color: rgba(255, 255, 255, 0.6);
}

.form-group input:focus {
    background: rgba(255, 255, 255, 0.3);
    outline: none;
    box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
    transform: scale(1.02);
}

.form-group i {
    position: absolute;
    left: 20px;
    top: 40px;
    color: white;
    font-size: 1rem;
    transition: transform 0.3s ease;
}

.form-group input:focus + i {
    transform: scale(1.2);
    color: var(--accent);
}

.remember-forgot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    font-size: 0.85rem;
    transform: translateZ(15px);
    animation: fadeIn 1s ease-out;
}

.remember-me {
    display: flex;
    align-items: center;
    color: white;
}

.remember-me input {
    margin-right: 8px;
    accent-color: var(--accent);
    cursor: pointer;
    transform: scale(1.2);
    transition: transform 0.2s ease;
}

.remember-me input:hover {
    transform: scale(1.4);
}

.forgot-password a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    transition: all 0.3s ease;
    position: relative;
}

.forgot-password a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: -2px;
    left: 0;
    background-color: var(--accent);
    transition: width 0.3s ease;
}

.forgot-password a:hover {
    color: var(--accent);
}

.forgot-password a:hover::after {
    width: 100%;
}


#signin-butto{
    text-decoration: none;
    align-items: center;
    text-align: center;
}

.signin-button {
    width: 100%;
    padding: 15px;
    text-decoration: none;
    list-style: none;
    /* align-self: center; */
    align-items: center;
    background: white;
    color: var(--primary);
    border: none;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin-bottom: 25px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    transform: translateZ(25px);
    position: relative;
    /* left: 150px; */
    overflow: hidden;
    animation: pulse 2s infinite;
}

.signin-button:hover {
    background: var(--accent);
    color: white;
    transform: translateY(-3px) translateZ(25px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    animation: none;
}

.signin-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: 0.5s;
}

.signin-button:hover::before {
    left: 100%;
}

.social-login {
    text-align: center;
    margin-bottom: 25px;
    transform: translateZ(10px);
    animation: fadeIn 1.2s ease-out;
}

.social-login p {
    color: white;
    margin-bottom: 15px;
    position: relative;
}

.social-login p::before, 
.social-login p::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: rgba(255, 255, 255, 0.3);
}

.social-login p::before {
    left: 0;
}

.social-login p::after {
    right: 0;
}

.social-icons {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.social-icons {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.social-icon {
    width: 50px;
    height: 50px;
    border-radius: 12px; /* Start with slightly rounded corners */
    background: rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-decoration: none;
    transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    position: relative;
    overflow: hidden;
    transform-origin: center;
}

.social-icon:hover {
    background: white;
    color: var(--primary);
    transform: translateY(-5px) scale(1.1);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    border-radius: 50%; /* Morph to full circle on hover */
}

.social-icon i {
    transition: transform 0.4s cubic-bezier(0.68, -0.6, 0.32, 1.6);
}

.social-icon:hover i {
    transform: rotate(360deg) scale(1.2);
}

.social-icon::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.4),
        transparent
    );
    transition: 0.6s;
}

.social-icon:hover::before {
    left: 100%;
}

/* Specific colors for each social button */
.social-icon:nth-child(1):hover { background: #1da1f2; color: white; } /* Google */
.social-icon:nth-child(2):hover { background:#1da1f2; color: white; } /* Facebook */
.social-icon:nth-child(3):hover { background: #1da1f2; color: white; } /* Twitter */
.social-icon:nth-child(4):hover { background:#1da1f2; color: white; } /* Apple */

/* Animation for the "Or sign in with" text */
.social-login p {
    color: white;
    margin-bottom: 20px;
    position: relative;
    animation: textGlow 2s infinite alternate;
}

@keyframes textGlow {
    from {
        text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
    }
    to {
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
    }
}

.signup-link {
    text-align: center;
    color: white;
    font-size: 0.9rem;
    transform: translateZ(10px);
    animation: fadeIn 1.4s ease-out;
}

.signup-link a {
    color: white;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s ease;
    position: relative;
}

.signup-link a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: -2px;
    left: 0;
    background-color: var(--accent);
    transition: width 0.3s ease;
}

.signup-link a:hover {
    color: var(--accent);
}

.signup-link a:hover::after {
    width: 100%;
}

@keyframes float {
    0% {
        transform: translate(0, 0) rotate(0deg);
    }
    50% {
        transform: translate(50px, 50px) rotate(180deg);
    }
    100% {
        transform: translate(0, 0) rotate(360deg);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px) translateZ(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0) translateZ(20px);
    }
}

@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
    }
    70% {
        box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
    }
}

#message{
    color: white;
    font-size: 0.7rem;
    margin-top: 5px;
}
    </style>
</head>
<body>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    
    <div class="signin-container">
        <div class="signin-header">
            <h1>Welcome Back!</h1>
            <p>Log in to access your account</p>
        </div>
        
        <form action="#" method="post" class="fr">
            <div class="form-group">
                <label for="email">Email Address</label>
         
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <i class="fas fa-lock"></i>
               
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                       <p id="message"></p>

            </div>
            
            
            <div class="remember-forgot">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <div class="forgot-password">
                    <a href="#">Forgot password?</a>
                </div>
            </div>
            
                <div id="customModal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border: 1px solid #ccc; z-index: 1000;">
               
                <!-- <button onclick="document.getElementById('customModal').style.display = 'none'">Close</button> -->
            </div>
<button type="submit" class="signin-button">Log in</button>


        </form>
        
        <div class="social-login">
            <p>Or Log in with</p>
            <div class="social-icons">
                <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-apple"></i></a>
            </div>
        </div>
        
        <div class="signup-link">
            Don't have an account? <a href="#">Sign up now</a>
        </div>
    </div>
<script>
let form = document.querySelector(".fr");

// Load users from localstorage or create default user
let users = JSON.parse(localStorage.getItem("users")) || [
    {
        email: "user@example.com",
        password: "Password123!"
    }
];

localStorage.setItem("users", JSON.stringify(users));

form.addEventListener("submit", function(event) {
    event.preventDefault();

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    const message = document.getElementById("message");

    // Password format validation FIRST
    const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,}$/;

    if (!passwordPattern.test(password)) {
        message.textContent = "Password must contain uppercase, lowercase, number, special character, and be at least 8 characters.";
        return;
    }

    // Check if user exists
    let user = users.find((u) => u.email === email && u.password === password);

    if (user) {
        message.style.color = "lightgreen";
        message.textContent = "Login successful!";
        
        // Redirect after short delay
        setTimeout(() => {
            window.location = "index.html";
        }, 1);
        return;

    } else {
        message.style.color = "salmon";
        // message.textContent = "Invalid email or password.";
        users.push({ email, password });
        //   setTimeout(() => {
        //     window.location = "index.html";
        // }, 1000);
       window.location = "index.html";
        // alert("new user created with provided credentials. Redirecting to home page.");
    }
});
</script>




</body>
</html>
